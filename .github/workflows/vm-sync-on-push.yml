# After you push to the default branch, SSH into the GCE VM and run vm_pull_latest.sh
# so the instance tracks the same repo without manual deploys.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   GCP_SA_JSON   — JSON key for a service account that can use gcloud compute ssh
#   GCP_PROJECT   — e.g. datacloudpoc
#   GCP_ZONE      — e.g. asia-southeast1-a
#   GCP_VM_NAME   — e.g. spotballer-vm-2
#
# IAM (typical):
#   - Service account: roles/compute.instanceAdmin.v1 or compute.osAdminLogin + compute.osLogin
#   - For --tunnel-through-iap: IAP-secured tunnel permission on the VM
# If IAP is not configured, remove --tunnel-through-iap below and allow SSH via your network/firewall rules.

name: VM git sync

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  pull-on-vm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: git pull on GCE VM
        run: |
          set -euo pipefail
          gcloud config set project "${{ secrets.GCP_PROJECT }}"
          gcloud compute ssh "${{ secrets.GCP_VM_NAME }}" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT }}" \
            --tunnel-through-iap \
            --command='export SPOTBALLER_HOME="${SPOTBALLER_HOME:-$HOME/SpotBaller}"; bash "$SPOTBALLER_HOME/infra/gcp/vm_pull_latest.sh"'
